<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gabriel Maglia — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500;1,700&family=Syne:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* ===================== TOKENS ===================== */
  :root{
    /* default palette — crema cálido / tinta / naranja quemado */
    --paper:#efe7d6;
    --paper-2:#e7dcc6;
    --ink:#16140f;
    --ink-2:#26221a;
    --accent:#e2552e;
    --accent-ink:#16140f;

    --font-display:"Archivo", system-ui, sans-serif;
    --font-serif:"Instrument Serif", Georgia, serif;
    --font-mono:"Space Mono", ui-monospace, monospace;

    --ease:cubic-bezier(.16,1,.3,1);
    --frame:clamp(18px,2.2vw,38px); /* outer margin of fixed UI */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--ink);
    color:var(--ink);
    font-family:var(--font-display);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  ::selection{ background:var(--accent); color:var(--paper); }

  /* spacer creates the vertical scroll distance that drives horizontal travel */
  #spacer{ width:1px; }

  /* ===================== STAGE / TRACK ===================== */
  #stage{
    position:fixed; inset:0; overflow:hidden;
    background:var(--ink);
    z-index:1;
  }
  #track{
    position:absolute; top:0; left:0; height:100%;
    display:flex; will-change:transform;
  }
  .panel{
    position:relative; width:100vw; height:100%;
    flex:0 0 100vw; overflow:hidden;
    display:flex; align-items:center;
    padding: calc(var(--frame) * 3.4) clamp(28px,7vw,150px) calc(var(--frame) * 3);
  }
  /* alternating contrast */
  .panel.p-paper{ background:var(--paper); color:var(--ink); }
  .panel.p-ink{ background:var(--ink); color:var(--paper); }
  .panel.p-accent{ background:var(--accent); color:var(--accent-ink); }

  /* hairline seam on the left edge of every panel */
  .panel::before{
    content:""; position:absolute; top:0; left:0; bottom:0; width:1px;
    background:currentColor; opacity:.16;
  }

  /* film-grain / paper texture */
  #stage::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:40;
    opacity:.045; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ===================== PARALLAX LAYERS ===================== */
  .layer{ will-change:transform; }
  .panel{ --d:0; }
  .pll-back{ transform:translate3d(calc(var(--d) * 9vw),0,0); }
  .pll-mid { transform:translate3d(calc(var(--d) * 4.5vw),0,0); }
  .pll-fore{ transform:translate3d(calc(var(--d) * -2.2vw),0,0); }

  /* ===================== FIXED UI FRAME ===================== */
  .frame{ position:fixed; z-index:60; pointer-events:none;
    color:var(--ui,#efe7d6); font-family:var(--font-mono);
    font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    transition:color .6s var(--ease); }
  .frame a{ pointer-events:auto; color:inherit; text-decoration:none; }

  .frame--tl{ top:var(--frame); left:var(--frame); }
  .frame--tr{ top:var(--frame); right:var(--frame); text-align:right;
    display:flex; align-items:center; gap:14px; }
  .frame--bl{ bottom:var(--frame); left:var(--frame); }
  .frame--br{ bottom:var(--frame); right:var(--frame); }

  .sig{ font-family:var(--font-display); font-weight:800;
    font-size:14px; letter-spacing:.01em; text-transform:none; line-height:1; }
  .sig em{ font-family:var(--font-serif); font-style:italic; font-weight:400; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent);
    display:inline-block; box-shadow:0 0 0 0 var(--accent);
    animation:pulse 2.6s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(226,85,46,.5)} 70%{box-shadow:0 0 0 7px rgba(226,85,46,0)} 100%{box-shadow:0 0 0 0 rgba(226,85,46,0)} }

  /* progress bar */
  .pbar{ position:fixed; left:var(--frame); right:var(--frame); bottom:calc(var(--frame) + 26px);
    height:1px; background:var(--ui,#efe7d6); opacity:.22; z-index:60; }
  .pbar__fill{ position:absolute; left:0; top:-0.5px; height:2px; width:0;
    background:var(--accent); transition:width .12s linear; }

  /* big section counter bottom-center */
  .counter{ position:fixed; bottom:var(--frame); left:50%; transform:translateX(-50%);
    z-index:60; font-family:var(--font-mono); font-size:11px; letter-spacing:.18em;
    color:var(--ui,#efe7d6); text-transform:uppercase; display:flex; gap:10px; align-items:baseline;
    transition:color .6s var(--ease); }
  .counter b{ font-family:var(--font-display); font-weight:800; font-size:13px; }

  /* nav (top-right list) */
  .nav{ display:flex; gap:18px; }
  .nav button{ all:unset; cursor:pointer; pointer-events:auto; color:inherit;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    opacity:.6; transition:opacity .3s; position:relative; }
  .nav button:hover{ opacity:1; }
  .nav button.on{ opacity:1; }
  .nav button.on::after{ content:""; position:absolute; left:0; right:0; bottom:-5px; height:1.5px; background:var(--accent); }

  @media (max-width: 720px){ .nav{ display:none; } }

  /* scroll hint */
  .hint{ position:fixed; right:var(--frame); top:50%; transform:translateY(-50%) rotate(180deg);
    writing-mode:vertical-rl; z-index:55; font-family:var(--font-mono); font-size:10px;
    letter-spacing:.3em; text-transform:uppercase; color:var(--ui,#efe7d6); opacity:.55;
    display:flex; align-items:center; gap:12px; transition:color .6s var(--ease),opacity .5s; }
  .hint .ln{ writing-mode:horizontal-tb; width:1px; height:42px; background:currentColor;
    position:relative; overflow:hidden; }
  .hint .ln::after{ content:""; position:absolute; left:0; right:0; top:-50%; height:50%;
    background:var(--accent); animation:slide 1.8s var(--ease) infinite; }
  @keyframes slide{ to{ top:100%; } }
  body.scrolled .hint{ opacity:0; }

  /* ===================== TYPE PRIMITIVES ===================== */
  .kicker{ font-family:var(--font-mono); font-size:clamp(10px,.85vw,13px);
    letter-spacing:.24em; text-transform:uppercase; opacity:.7; }
  .ser{ font-family:var(--font-serif); font-style:italic; font-weight:400; }
  .display{ font-weight:800; line-height:.86; letter-spacing:-.03em; text-wrap:balance; }
  .outline{ -webkit-text-stroke:1.4px currentColor; color:transparent; }

  /* utility */
  .col{ display:flex; flex-direction:column; }
  .reveal{ opacity:0; transform:translateY(24px); }
  .panel[data-active="1"] .reveal{ opacity:1; transform:none;
    transition:opacity .9s var(--ease), transform .9s var(--ease); }
  .panel[data-active="1"] .reveal.d1{ transition-delay:.06s; }
  .panel[data-active="1"] .reveal.d2{ transition-delay:.12s; }
  .panel[data-active="1"] .reveal.d3{ transition-delay:.18s; }
  .panel[data-active="1"] .reveal.d4{ transition-delay:.24s; }
  @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1 !important; transform:none !important; } }

  image-slot{ display:block; --is-bg:rgba(0,0,0,.06); }

  #root{ position:relative; z-index:1; }
  .loading{ position:fixed; inset:0; background:var(--ink); z-index:200;
    display:flex; align-items:center; justify-content:center; color:var(--paper);
    font-family:var(--font-mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase;
    transition:opacity .6s ease; }

  /* ---- marquee ---- */
  @keyframes mq{ to{ transform:translateX(-50%); } }

  /* ---- project card hover ---- */
  .proj-card{ transition:opacity .4s var(--ease); }
  .proj-card:hover .card-arrow{ opacity:1 !important; transform:none !important; }
  .proj-card:hover .display{ color:var(--accent); transition:color .3s var(--ease); }
  .panel:hover .proj-card:not(:hover){ opacity:.55; }

  /* ---- experience row hover ---- */
  .exp-row{ transition:padding-left .4s var(--ease), background .4s var(--ease); }
  .exp-row:hover{ padding-left:18px; }
  .exp-row:hover .display{ color:var(--accent); transition:color .3s var(--ease); }

  /* ---- contact hovers ---- */
  .email-link{ transition:opacity .3s var(--ease), letter-spacing .4s var(--ease); }
  .email-link:hover{ letter-spacing:0; }
  .social{ transition:transform .3s var(--ease); }
  .social:hover{ transform:translateY(-3px); }
  .social:hover .social-handle{ text-decoration:underline; text-underline-offset:4px; }

  /* ===================== MOBILE ===================== */
  @media (max-width: 768px) {
    :root{ --frame: 18px; }

    .panel{
      padding: 72px 22px 52px !important;
      align-items: stretch !important;
    }

    /* --- HERO mobile --- */
    .hero-wrap{ max-width:100% !important; }
    .hero-below{ max-width:100% !important; margin-top:14px !important; }
    .hero-meta{
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 10px !important;
      margin-top: 20px !important;
    }

    /* --- ABOUT --- */
    .about-grid{
      grid-template-columns: 1fr !important;
      gap: 28px !important;
      align-items: flex-start !important;
      overflow-y: auto;
      max-height: calc(100vh - 128px);
    }
    .about-right{ order: -1 !important; }
    .about-right image-slot{ height: clamp(200px, 40vw, 260px) !important; }
    .about-paras{ max-width: 100% !important; }
    .stats-row{ gap: 32px !important; margin-top: 22px !important; }

    /* --- PROYECTOS --- */
    .proj-grid{
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 14px !important;
      overflow-y: auto;
      max-height: calc(100vh - 220px);
    }
    .proj-grid image-slot{ height: clamp(100px, 26vw, 160px) !important; }

    /* --- EXPERIENCIA --- */
    .exp-list{ overflow-y: auto; max-height: calc(100vh - 200px); }
    .exp-row{
      grid-template-columns: auto 1fr !important;
      grid-template-rows: auto auto !important;
      gap: 4px 12px !important;
      padding: 16px 4px !important;
    }
    .exp-row .display{
      font-size: clamp(1.3rem, 6vw, 2rem) !important;
      grid-column: 2; grid-row: 1;
    }
    .exp-row > span:first-child{ grid-column:1; grid-row:1/3; align-self:center; }
    .exp-row > span:nth-child(3){ grid-column:2; grid-row:2; font-size:13px !important; }
    .exp-row > span:nth-child(4){ display:none; }

    /* --- CONTACTO --- */
    .contact-socials{ flex-direction: column !important; gap: 18px !important; }

    .pbar{ bottom: calc(var(--frame) + 22px); }
    .hint{ display: none !important; }
    .sig{ font-size: 12px !important; }
    .chips{ flex-wrap: nowrap !important; overflow-x: auto; padding-bottom: 4px; }
  }

  @media (max-width: 420px) {
    .proj-grid{ grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
  <div class="loading" id="loading">Cargando…</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="image-slot.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
